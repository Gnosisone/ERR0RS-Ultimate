# ============================================================
# ERR0RS ULTIMATE — Tool Defaults Configuration
# Customize default flags for each integrated tool
# ============================================================

[nmap]
default_flags = -sV -sC --open
timing = T4
output_format = xml

[hydra]
default_threads = 16
default_wordlist = /usr/share/wordlists/rockyou.txt

[gobuster]
default_wordlist = /usr/share/seclists/Discovery/Web-Content/common.txt
default_threads = 40
default_extensions = php,html,txt,js

[sqlmap]
default_level = 2
default_risk = 1
default_batch = true

[hashcat]
default_mode = 0
default_wordlist = /usr/share/wordlists/rockyou.txt

[nikto]
default_timeout = 30

[aircrack]
default_interface = wlan0

[metasploit]
default_lhost = 127.0.0.1
default_lport = 4444
