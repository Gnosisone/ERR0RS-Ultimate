<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERR0RS // PURPLE TEAM OPERATOR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- xterm.js — real terminal renderer (v5.5.0) -->
  <link  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/xterm.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/5.5.0/addon-fit.min.js"></script>

  <style>
    :root {
      --void:      #04000a;
      --panel:     #0c0020;
      --border:    #1e0040;
      --purple:    #7b2fbe;
      --purple-hi: #c084fc;
      --purple-lo: #2d0a60;
      --neon:      #bf6fff;
      --green:     #39ff14;
      --cyan:      #00f5ff;
      --red:       #ff2255;
      --blue:      #4488ff;
      --amber:     #ffaa00;
      --text:      #d4b8ff;
      --text-dim:  #4a2870;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height: 100%;
      background: var(--void);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }
    body::after {
      content:'';
      position:fixed; inset:0;
      background: repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.1) 3px,rgba(0,0,0,.1) 4px);
      pointer-events:none;
      z-index:9999;
    }

    /* ── TOP BAR ─────────────────────────────── */
    #topbar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: linear-gradient(90deg, #04000a 0%, #110033 50%, #04000a 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 100;
    }
    .tb-logo {
      font-family: 'Orbitron', monospace;
      font-size: .65rem;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--neon);
    }
    .tb-mode-badge {
      font-family: 'Orbitron', monospace;
      font-size: .55rem;
      letter-spacing: 3px;
      padding: 4px 14px;
      border-radius: 20px;
      border: 1px solid var(--purple-hi);
      background: rgba(123,47,190,.15);
      color: var(--purple-hi);
    }
    .tb-actions { display:flex; gap:10px; align-items:center; }
    .tb-btn {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: .6rem;
      letter-spacing: 1.5px;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid;
      transition: all .2s;
    }
    .tb-btn.save  { border-color:var(--green);  color:var(--green);  background:rgba(57,255,20,.06); }
    .tb-btn.load  { border-color:var(--cyan);   color:var(--cyan);   background:rgba(0,245,255,.06); }
    .tb-btn.clear { border-color:var(--red);    color:var(--red);    background:rgba(255,34,85,.06); }
    .tb-btn.home  { border-color:var(--neon);   color:var(--neon);   background:rgba(191,111,255,.06); }
    .tb-btn:hover { filter:brightness(1.4); }
    #session-name-input {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      padding: 3px 8px;
      border-radius: 4px;
      width: 180px;
    }
    #session-name-input:focus { outline:none; border-color:var(--neon); }

    /* ── MAIN SPLIT LAYOUT ───────────────────── */
    #split-view {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      height: calc(100vh - 44px - 38px);
      gap: 0;
    }

    /* ── TEAM PANEL ──────────────────────────── */
    .team-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .team-panel.blue { border-right: none; border-left: 1px solid var(--border); }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      flex-shrink: 0;
    }
    .panel-header.red  { background: linear-gradient(90deg, rgba(255,34,85,.12), transparent); border-bottom: 1px solid rgba(255,34,85,.3); }
    .panel-header.blue { background: linear-gradient(90deg, rgba(68,136,255,.12), transparent); border-bottom: 1px solid rgba(68,136,255,.3); }

    .ph-title {
      font-family: 'Orbitron', monospace;
      font-size: .55rem;
      letter-spacing: 3px;
      font-weight: 700;
    }
    .ph-title.red  { color: var(--red); }
    .ph-title.blue { color: var(--blue); }

    .ph-badge {
      font-size: .52rem;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .ph-badge.red  { border:1px solid var(--red);  color:var(--red);  background:rgba(255,34,85,.08); }
    .ph-badge.blue { border:1px solid var(--blue); color:var(--blue); background:rgba(68,136,255,.08); }
    .ph-badge.live { animation: pulse-pill 1.5s infinite; }

    @keyframes pulse-pill {
      0%,100% { opacity:1; }
      50%      { opacity:.4; }
    }

    /* xterm container */
    .xterm-container {
      flex: 1;
      overflow: hidden;
      padding: 4px;
      background: #000;
    }
    .xterm-container .xterm { height: 100%; }

    /* Blue team detection feed */
    #blue-feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      background: #000812;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #blue-feed::-webkit-scrollbar { width: 3px; }
    #blue-feed::-webkit-scrollbar-thumb { background: rgba(68,136,255,.3); }

    .detection-event {
      padding: 6px 10px;
      border-radius: 4px;
      font-size: .68rem;
      line-height: 1.5;
      border-left: 3px solid;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

    .det-critical { border-color:#ff2255; background:rgba(255,34,85,.08); color:#ff8099; }
    .det-high     { border-color:#ff6600; background:rgba(255,102,0,.08); color:#ffaa66; }
    .det-medium   { border-color:#ffaa00; background:rgba(255,170,0,.08); color:#ffd066; }
    .det-low      { border-color:#4488ff; background:rgba(68,136,255,.06); color:#99bbff; }
    .det-info     { border-color:#7b2fbe; background:rgba(123,47,190,.06); color:#c084fc; }

    .det-time { color: var(--text-dim); font-size: .6rem; }
    .det-tool { font-weight: bold; font-size: .6rem; letter-spacing: 1px; }
    .det-desc { margin-top: 2px; }
    .det-ioc  { color: #ff2255; font-size: .62rem; margin-top: 2px; font-family: 'Share Tech Mono', monospace; }
    .det-mitigation { color: #39ff14; font-size: .62rem; margin-top: 2px; }

    /* Empty state */
    #blue-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      gap: 8px;
    }
    .blue-empty-icon { font-size: 2rem; opacity: .4; }
    .blue-empty-text { font-size: .65rem; letter-spacing: 2px; opacity: .5; }

    /* ── INPUT ROW ───────────────────────────── */
    #input-row {
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      background: #000;
      border-top: 1px solid var(--border);
      position: relative;
    }
    #term-prompt { color: var(--green); font-size: .72rem; white-space: nowrap; }
    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem;
      caret-color: var(--green);
    }
    #cmd-input::placeholder { color: var(--text-dim); }
    #autocomplete-box {
      position: absolute;
      bottom: 40px;
      left: 14px;
      background: #0c0020;
      border: 1px solid var(--purple);
      border-radius: 6px;
      display: none;
      flex-direction: column;
      min-width: 280px;
      max-height: 160px;
      overflow-y: auto;
      z-index: 500;
    }
    .ac-item {
      padding: 4px 12px;
      font-size: .65rem;
      cursor: pointer;
      color: var(--text);
      transition: background .1s;
    }
    .ac-item:hover, .ac-item.selected { background: rgba(123,47,190,.3); color: var(--neon); }
    .ac-item span { color: var(--text-dim); margin-left: 8px; font-size: .6rem; }

    .input-btns { display:flex; gap:6px; }
    .in-btn {
      font-family:'Rajdhani',sans-serif; font-weight:700;
      font-size:.55rem; letter-spacing:1px;
      padding:3px 10px; border-radius:4px;
      cursor:pointer; border:1px solid; transition:all .2s;
    }
    #btn-teach { border-color:var(--amber); color:var(--amber); background:rgba(255,170,0,.06); }
    #btn-teach.on { background:rgba(255,170,0,.2); box-shadow:0 0 8px rgba(255,170,0,.3); }
    #btn-ctrlc { border-color:var(--red); color:var(--red); background:rgba(255,34,85,.06); }
    #btn-ctrlc:hover { background:rgba(255,34,85,.2); }
    #ws-status {
      font-size:.55rem; padding:2px 8px; border-radius:20px;
      font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:1px;
    }
    #ws-status.connected { border:1px solid var(--green); color:var(--green); background:rgba(57,255,20,.08); }
    #ws-status.disconnected { border:1px solid var(--text-dim); color:var(--text-dim); }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div class="tb-logo">ERR0RS // OPERATOR CONSOLE</div>
  <div class="tb-mode-badge">⬛ PURPLE TEAM — ATTACK + DETECT</div>
  <div class="tb-actions">
    <input id="session-name-input" type="text" placeholder="session name (e.g. lab_scan_1)" value=""/>
    <button class="tb-btn save"  onclick="saveSession()">💾 SAVE</button>
    <button class="tb-btn load"  onclick="loadSession()">📂 LOAD</button>

<!-- SPLIT VIEW -->
<div id="split-view">

  <!-- ── RED TEAM — ATTACK TERMINAL ── -->
  <div class="team-panel red">

  <!-- ── BLUE TEAM — DETECTION FEED ── -->
  <div class="team-panel blue">

      <div class="ph-title blue">🔵 BLUE TEAM — DETECTION FEED</div>
      <div style="display:flex;gap:6px;align-items:center;">
        <span class="ph-badge blue" id="blue-status">⬤ MONITORING</span>

    <!-- Detection events render here -->

        </div>
      </div>
    </div>
  </div>

</div><!-- /split-view -->

<!-- INPUT ROW (shared, controls red terminal) -->
<div id="input-row">
  <span id="term-prompt">ERR0RS@kali:~$&nbsp;</span>
  <input id="cmd-input" type="text" autocomplete="off" spellcheck="false"
    placeholder="type command or ask ERR0RS... --teach for inline education... ↑↓ history... TAB autocomplete"/>
  <div id="autocomplete-box"></div>
  <div class="input-btns">
    <span id="ws-status" class="disconnected">⬤ CONNECTING</span>
    <button class="in-btn" id="btn-teach" onclick="toggleTeach()">📚 TEACH OFF</button>
    <button class="in-btn" id="btn-ctrlc" onclick="sendCtrlC()">⬛ CTRL+C</button>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════
// XTERM.JS TERMINAL — Real terminal renderer
// ══════════════════════════════════════════════════════════
const term = new Terminal({
  fontFamily: "'Share Tech Mono', 'Courier New', monospace",
  fontSize: 13,
  lineHeight: 1.3,
  cursorBlink: true,
  cursorStyle: 'block',
  theme: {
    background:    '#000000',
    foreground:    '#d4b8ff',
    cursor:        '#39ff14',
    cursorAccent:  '#000000',
    black:         '#000000',
    red:           '#ff2255',
    green:         '#39ff14',
    yellow:        '#ffaa00',
    blue:          '#4488ff',
    magenta:       '#bf6fff',
    cyan:          '#00f5ff',
    white:         '#d4b8ff',
    brightBlack:   '#4a2870',
    brightRed:     '#ff6680',
    brightGreen:   '#6fff50',
    brightYellow:  '#ffd066',
    brightBlue:    '#88aaff',
    brightMagenta: '#e0b0ff',
    brightCyan:    '#66ffff',
    brightWhite:   '#ffffff',
  },
  scrollback: 5000,
  allowTransparency: false,
  convertEol: true,
});

// FitAddon resizes terminal to fill container
const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);

const container = document.getElementById('red-term-container');
term.open(container);
fitAddon.fit();
window.addEventListener('resize', () => fitAddon.fit());

// Write styled text helpers
const W = {
  line:    (s) => term.writeln(s),
  system:  (s) => term.writeln(`\x1b[38;5;141m${s}\x1b[0m`),
  green:   (s) => term.writeln(`\x1b[38;5;82m${s}\x1b[0m`),
  red:     (s) => term.writeln(`\x1b[38;5;196m${s}\x1b[0m`),
  yellow:  (s) => term.writeln(`\x1b[38;5;220m${s}\x1b[0m`),
  cyan:    (s) => term.writeln(`\x1b[38;5;51m${s}\x1b[0m`),
  blue:    (s) => term.writeln(`\x1b[38;5;69m${s}\x1b[0m`),
  dim:     (s) => term.writeln(`\x1b[38;5;60m${s}\x1b[0m`),
  teach:   (s) => {
    term.writeln('');
    term.writeln(`\x1b[38;5;220m┌─ [ERR0RS TEACHES] ──────────────────────────────\x1b[0m`);
    s.split('\n').forEach(l => term.writeln(`\x1b[38;5;220m│ ${l}\x1b[0m`));
    term.writeln(`\x1b[38;5;220m└──────────────────────────────────────────────────\x1b[0m`);
    term.writeln('');
  },
  banner:  (s) => term.writeln(`\x1b[38;5;129m${s}\x1b[0m`),
  prompt:  ()  => term.write(`\x1b[38;5;82mERR0RS@kali:~$\x1b[0m `),
};

// Boot banner
W.banner('  ██████╗ ██╗   ██╗██████╗ ██████╗ ██╗     ███████╗');
W.banner('  ██╔══██╗██║   ██║██╔══██╗██╔══██╗██║     ██╔════╝');
W.banner('  ██████╔╝██║   ██║██████╔╝██████╔╝██║     █████╗  ');
W.banner('  ██╔═══╝ ██║   ██║██╔══██╗██╔═══╝ ██║     ██╔══╝  ');
W.banner('  ██║     ╚██████╔╝██║  ██║██║     ███████╗███████╗');
W.banner('  ╚═╝      ╚═════╝ ╚═╝  ╚═╝╚═╝     ╚══════╝╚══════╝');
W.system('  PURPLE TEAM OPERATOR CONSOLE v3.0 — ATTACK + DETECT');
W.dim   ('  ─────────────────────────────────────────────────────');
W.system('  Red  terminal → run attacks, tools, exploits');
W.system('  Blue feed     → see what a defender would detect');
W.system('  Type HELP for command guide. Add --teach for lessons.');
W.dim   ('  ─────────────────────────────────────────────────────');
term.writeln('');

// ══════════════════════════════════════════════════════════
// SESSION MANAGEMENT — save/load engagement state
// ══════════════════════════════════════════════════════════
let sessionLog = [];  // {time, type, data}[]

function logEvent(type, data) {
  sessionLog.push({ time: new Date().toISOString(), type, data });
}

function saveSession() {
  const name = document.getElementById('session-name-input').value.trim()
    || `errz_session_${new Date().toISOString().replace(/[:.]/g,'-').slice(0,19)}`;
  const payload = {
    name,
    saved: new Date().toISOString(),
    cmdHistory,
    detectionEvents,
    sessionLog,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${name}.errz.json`;
  a.click();
  W.system(`[ERR0RS] Session saved → ${name}.errz.json`);
}

function loadSession() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.json,.errz.json';
  inp.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        document.getElementById('session-name-input').value = data.name || '';
        if (data.cmdHistory) cmdHistory = data.cmdHistory;
        if (data.detectionEvents) {
          detectionEvents = data.detectionEvents;
          detectionEvents.forEach(e => renderDetection(e));
        }
        W.system(`[ERR0RS] Session loaded: ${data.name}`);
        W.system(`[ERR0RS] Commands: ${data.cmdHistory?.length || 0} | Detections: ${data.detectionEvents?.length || 0}`);
      } catch(err) {
        W.red(`[ERR0RS] Failed to load session: ${err.message}`);
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

function clearAll() {
  term.clear();
  document.getElementById('blue-feed').innerHTML = `
    <div id="blue-empty">
      <div class="blue-empty-icon">🛡</div>
      <div class="blue-empty-text">WAITING FOR ATTACK ACTIVITY</div>
    </div>`;
  detectionEvents = [];
  sessionLog = [];
  detCount = 0;
  document.getElementById('det-count').textContent = '0 EVENTS';
  W.system('[ERR0RS] Session cleared.');
}

// ══════════════════════════════════════════════════════════
// COMMAND HISTORY — up/down arrow navigation
// ══════════════════════════════════════════════════════════
let cmdHistory = [];
let histIdx    = -1;
const cmdInput = document.getElementById('cmd-input');

cmdInput.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) {
      histIdx++;
      cmdInput.value = cmdHistory[cmdHistory.length - 1 - histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) {
      histIdx--;
      cmdInput.value = cmdHistory[cmdHistory.length - 1 - histIdx];
    } else {
      histIdx = -1;
      cmdInput.value = '';
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    handleTabComplete(cmdInput.value);
  } else if (e.key === 'Escape') {
    closeAutocomplete();
  }
});

// ══════════════════════════════════════════════════════════
// TAB AUTOCOMPLETE
// ══════════════════════════════════════════════════════════
const AUTOCOMPLETE_CMDS = [
  // Tool commands
  { cmd: 'nmap',         hint: '<target> — port scan' },
  { cmd: 'sqlmap',       hint: '-u <url> — SQLi test' },
  { cmd: 'gobuster',     hint: 'dir -u <url> — directory bust' },
  { cmd: 'nikto',        hint: '-h <target> — web scanner' },
  { cmd: 'hydra',        hint: '<target> ssh — brute force' },
  { cmd: 'metasploit',   hint: 'msfconsole — exploit framework' },
  { cmd: 'hashcat',      hint: '<hash> — crack password hash' },
  { cmd: 'nuclei',       hint: '-u <url> — vuln scanner' },
  { cmd: 'subfinder',    hint: '-d <domain> — subdomain enum' },
  { cmd: 'wpscan',       hint: '--url <url> — WordPress scanner' },
  { cmd: 'enum4linux',   hint: '-a <target> — SMB enumeration' },
  { cmd: 'crackmapexec', hint: 'smb <target> — AD attack' },
  { cmd: 'ffuf',         hint: '-u <url>/FUZZ — web fuzzer' },
  { cmd: 'aircrack-ng',  hint: '<cap> — WiFi cracker' },
  // Teach commands
  { cmd: 'teach me nmap',         hint: '→ offline nmap lesson' },
  { cmd: 'teach me sqlmap',       hint: '→ offline SQLi lesson' },
  { cmd: 'teach me metasploit',   hint: '→ offline MSF lesson' },
  { cmd: 'teach me hydra',        hint: '→ offline brute force lesson' },
  { cmd: 'teach me gobuster',     hint: '→ offline dir bust lesson' },
  { cmd: 'teach me privesc',      hint: '→ privilege escalation lesson' },
  { cmd: 'teach me xss',          hint: '→ XSS lesson' },
  { cmd: 'teach me sql injection', hint: '→ SQLi concept lesson' },
  { cmd: 'teach me hashcat',      hint: '→ password cracking lesson' },
  { cmd: 'teach me wireshark',    hint: '→ packet analysis lesson' },
  // Natural language
  { cmd: 'scan',              hint: '<target> — nmap scan via NLP' },
  { cmd: 'run nmap on',       hint: '<target>' },
  { cmd: 'run sqlmap on',     hint: '<url>' },
  { cmd: 'brute force',       hint: '<target> — hydra via NLP' },
  { cmd: 'enumerate',         hint: '<target> — gobuster via NLP' },
  { cmd: 'exploit',           hint: '<target> — metasploit via NLP' },
  { cmd: 'status',            hint: '— system health check' },
  { cmd: 'help',              hint: '— command guide' },
  { cmd: 'clear',             hint: '— clear terminal' },
];

let acIdx = -1;
const acBox = document.getElementById('autocomplete-box');

function handleTabComplete(val) {
  if (!val.trim()) return;
  const lower = val.toLowerCase();
  const matches = AUTOCOMPLETE_CMDS.filter(c => c.cmd.startsWith(lower) || c.cmd.includes(lower));
  if (matches.length === 0) { closeAutocomplete(); return; }
  if (matches.length === 1) {
    cmdInput.value = matches[0].cmd + ' ';
    closeAutocomplete();
    return;
  }
  renderAutocomplete(matches);
}

function renderAutocomplete(matches) {
  acBox.innerHTML = '';
  acIdx = -1;
  matches.slice(0, 10).forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'ac-item';
    div.innerHTML = `${m.cmd}<span>${m.hint}</span>`;
    div.addEventListener('click', () => {
      cmdInput.value = m.cmd + ' ';
      closeAutocomplete();
      cmdInput.focus();
    });
    acBox.appendChild(div);
  });
  acBox.style.display = 'flex';
}

function closeAutocomplete() {
  acBox.style.display = 'none';
  acIdx = -1;
}

cmdInput.addEventListener('input', () => {
  const val = cmdInput.value;
  if (!val.trim()) { closeAutocomplete(); return; }
  const lower = val.toLowerCase();
  const matches = AUTOCOMPLETE_CMDS.filter(c => c.cmd.startsWith(lower));
  if (matches.length > 0 && matches.length < 10) renderAutocomplete(matches);
  else closeAutocomplete();
});

document.addEventListener('click', (e) => {
  if (!acBox.contains(e.target) && e.target !== cmdInput) closeAutocomplete();
});
</script>

<script>
// ══════════════════════════════════════════════════════════
// WEBSOCKET CLIENT + COMMAND ROUTING
// ══════════════════════════════════════════════════════════
let ws          = null;
let wsConnected = false;
let teachMode   = false;
let currentTool = '';

const wsStatus = document.getElementById('ws-status');

async function connectWS() {
  let wsUrl = `ws://${location.hostname}:8766`;
  try {
    const r = await fetch('/api/ws_info');
    const d = await r.json();
    if (d.ws_available) wsUrl = d.ws_url;
  } catch(e) {}

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    wsConnected = true;
    wsStatus.textContent = '⬤ LIVE';
    wsStatus.className = 'connected';
    W.system('[ERR0RS] WebSocket connected → Live streaming active');
    W.dim   ('[ERR0RS] Commands route to real Kali tools via PTY');
    term.writeln('');
  };

  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      handleMsg(msg);
    } catch(e) {
      term.writeln(evt.data);
    }
  };

  ws.onclose = () => {
    wsConnected = false;
    wsStatus.textContent = '⬤ OFFLINE';
    wsStatus.className = 'disconnected';
    W.red('[ERR0RS] WebSocket disconnected — retrying in 3s...');
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    wsStatus.textContent = '⬤ ERROR';
    wsStatus.className = 'disconnected';
    W.red('[ERR0RS] WS Error — ensure: pip3 install websockets && python3 src/ui/errorz_launcher.py');
  };
}

function handleMsg(msg) {
  switch(msg.type) {
    case 'output':
      // Write raw output — xterm handles ANSI colors automatically
      term.writeln(msg.data || '');
      logEvent('output', msg.data);
      break;
    case 'teach':
      W.teach(msg.data);
      logEvent('teach', msg.data);
      break;
    case 'teach_block':
      W.teach(msg.data);
      logEvent('teach_block', msg.data);
      break;
    case 'system':
      W.system(msg.data || '');
      logEvent('system', msg.data);
      break;
    case 'error':
      W.red('[ERROR] ' + (msg.data || ''));
      logEvent('error', msg.data);
      break;
    case 'done':
      W.system(msg.data || '[ERR0RS] Done.');
      W.dim('─'.repeat(54));
      document.getElementById('red-status').textContent = '⬤ IDLE';
      logEvent('done', msg.data);
      break;
  }
}

// ══════════════════════════════════════════════════════════
// COMMAND EXECUTION
// ══════════════════════════════════════════════════════════

// Tool detection for purple team
const TOOL_DETECT = {
  'nmap':         ['nmap','port scan','scan port','network scan'],
  'sqlmap':       ['sqlmap','sql injection','sqli'],
  'gobuster':     ['gobuster','dir bust','dirb','enumerate dir'],
  'hydra':        ['hydra','brute force','bruteforce','credential'],
  'metasploit':   ['metasploit','msfconsole','msf'],
  'hashcat':      ['hashcat','crack hash'],
  'nikto':        ['nikto','web scan'],
  'nuclei':       ['nuclei','vuln scan'],
  'subfinder':    ['subfinder','subdomain'],
  'enum4linux':   ['enum4linux','smb enum'],
  'wpscan':       ['wpscan','wordpress'],
};

function detectTool(cmd) {
  const lower = cmd.toLowerCase();
  for (const [tool, triggers] of Object.entries(TOOL_DETECT)) {
    if (triggers.some(t => lower.includes(t))) return tool;
  }
  return null;
}

// Target extraction
function extractTarget(cmd) {
  const m = cmd.match(/(?:on|against|target|scan|at|for|http:\/\/|https:\/\/)\s*([\w.\-/:]+)/i);
  if (m) return m[1];
  const parts = cmd.trim().split(/\s+/);
  return parts[1] || '';
}

async function executeCommand(raw) {
  const cmd   = raw.trim();
  if (!cmd) return;

  // Add to history
  cmdHistory = cmdHistory.filter(h => h !== cmd);
  cmdHistory.push(cmd);
  if (cmdHistory.length > 200) cmdHistory.shift();
  histIdx = -1;

  // Echo to terminal
  term.writeln('');
  term.write(`\x1b[38;5;82mERR0RS@kali:~$\x1b[0m `);
  term.writeln(`\x1b[38;5;255m${cmd}\x1b[0m`);
  logEvent('cmd', cmd);

  // Local commands
  if (cmd === 'clear' || cmd === 'cls') { term.clear(); return; }
  if (cmd === 'help') { showHelp(); return; }

  // Detect tool for Purple Team
  const tool = detectTool(cmd);
  if (tool) {
    const target = extractTarget(cmd);
    currentTool = tool;

    // Update red status
    document.getElementById('red-status').textContent = `⬤ RUNNING ${tool.toUpperCase()}`;

    // Trigger blue team detections with delay (simulating detection lag)
    setTimeout(() => {
      W.blue(`\n[BLUE TEAM] Triggering detection engine for: ${tool.toUpperCase()}`);
      triggerDetections(tool, target);
    }, 1500);
  }

  // Route to WebSocket
  if (ws && wsConnected) {
    const isTeach = teachMode || cmd.includes('--teach');
    ws.send(JSON.stringify({
      type:    'run',
      command: cmd.replace('--teach', '').trim(),
      teach:   isTeach,
    }));
  } else {
    // HTTP fallback
    W.yellow('[ERR0RS] WS offline → HTTP fallback mode');
    try {
      const r = await fetch('/api/command', {
        method:  'POST',
        headers: {'Content-Type':'application/json'},
        body:    JSON.stringify({command: cmd}),
      });
      const d = await r.json();
      const out = d.stdout || d.error || 'No output';
      out.split('\n').forEach(l => term.writeln(l));
    } catch(err) {
      W.red(`[ERR0RS] HTTP error: ${err.message}`);
    }
  }
}

// Input handler
cmdInput.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  const raw = cmdInput.value.trim();
  if (!raw) return;
  cmdInput.value = '';
  closeAutocomplete();
  await executeCommand(raw);
});

function toggleTeach() {
  teachMode = !teachMode;
  const btn = document.getElementById('btn-teach');
  const ind = document.getElementById('teach-indicator');

    ind.style.display = 'block';
    W.yellow('[ERR0RS] TEACH MODE ON — I will explain results as they stream in');
  } else {
    btn.textContent = '📚 TEACH OFF';
    btn.classList.remove('on');
    ind.style.display = 'none';
    W.dim('[ERR0RS] Teach mode off — raw output mode');
  }
}

function sendCtrlC() {
  if (ws && wsConnected) {
    ws.send(JSON.stringify({ type: 'key', data: '\x03' }));
    W.yellow('[ERR0RS] Ctrl+C sent → stopping tool');
    document.getElementById('red-status').textContent = '⬤ IDLE';

function showHelp() {

}

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
connectWS();
cmdInput.focus();

// Prevent default tab behavior on the page
document.addEventListener('keydown', (e) => {
  if (e.key === 'Tab' && document.activeElement === cmdInput) e.preventDefault();
